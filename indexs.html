<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Registro de Estudiantes</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --border: #e2e8f0;
      --success: #16a34a;
      --danger: #dc2626;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
      color: #1e293b;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 768px) {
      .grid {
        grid-template-columns: 320px 1fr;
      }
    }

    .card {
      background: var(--card);
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      border: 1px solid var(--border);
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
    }

    .row-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      width: 100%;
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background-color: var(--primary-hover);
    }

    /* Tabla */
    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 14px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    th {
      background-color: #f1f5f9;
      font-weight: 600;
    }

    .badge {
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 12px;
    }

    .badge-approved {
      background-color: #dcfce7;
      color: var(--success);
    }

    .badge-rejected {
      background-color: #fee2e2;
      color: var(--danger);
    }

    .empty-msg {
      text-align: center;
      color: #64748b;
      padding: 20px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Registro Académico de Estudiantes</h1>

    <div class="grid">
      <!-- Formulario -->
      <div class="card">
        <h2>Nuevo Registro</h2>
        <br>
        <form id="studentForm">
          <div class="form-group">
            <label for="nombre">Nombre Completo</label>
            <input type="text" id="nombre" placeholder="Ej. Juan Pérez" required>
          </div>

          <div class="row-inputs">
            <div class="form-group">
              <label for="nota1">Nota 1</label>
              <input type="number" id="nota1" min="0" max="20" step="0.1" placeholder="0 - 20" required>
            </div>
            <div class="form-group">
              <label for="nota2">Nota 2</label>
              <input type="number" id="nota2" min="0" max="20" step="0.1" placeholder="0 - 20" required>
            </div>
          </div>

          <div class="row-inputs">
            <div class="form-group">
              <label for="nota3">Nota 3</label>
              <input type="number" id="nota3" min="0" max="20" step="0.1" placeholder="0 - 20" required>
            </div>
            <div class="form-group">
              <label for="faltas">Faltas</label>
              <input type="number" id="faltas" min="0" placeholder="Cant." required>
            </div>
          </div>

          <button type="submit">Guardar Estudiante</button>
        </form>
      </div>

      <!-- Tabla de Resultados -->
      <div class="card table-container">
        <h2>Lista de Alumnos</h2>
        <br>
        <table>
          <thead>
            <tr>
              <th>Estudiante</th>
              <th>Notas</th>
              <th>Promedio</th>
              <th>Faltas</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody id="studentTableBody">
            <tr id="emptyRow">
              <td colspan="5" class="empty-msg">No hay estudiantes registrados aún.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('studentForm');
    const tableBody = document.getElementById('studentTableBody');
    const emptyRow = document.getElementById('emptyRow');

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      // Obtener valores
      const nombre = document.getElementById('nombre').value;
      const n1 = parseFloat(document.getElementById('nota1').value);
      const n2 = parseFloat(document.getElementById('nota2').value);
      const n3 = parseFloat(document.getElementById('nota3').value);
      const faltas = parseInt(document.getElementById('faltas').value);

      // Calcular promedio
      const promedio = ((n1 + n2 + n3) / 3).toFixed(2);
      const aprobado = promedio >= 11;

      // Ocultar mensaje de tabla vacía si existe
      if (emptyRow) {
        emptyRow.style.display = 'none';
      }

      // Crear nueva fila
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><strong>${nombre}</strong></td>
        <td>${n1} | ${n2} | ${n3}</td>
        <td><strong>${promedio}</strong></td>
        <td>${faltas} hs</td>
        <td>
          <span class="badge ${aprobado ? 'badge-approved' : 'badge-rejected'}">
            ${aprobado ? 'Aprobado' : 'Desaprobado'}
          </span>
        </td>
      `;

      tableBody.appendChild(tr);

      // Limpiar formulario
      form.reset();
      document.getElementById('nombre').focus();
    });
  </script>
</body>
</html>
